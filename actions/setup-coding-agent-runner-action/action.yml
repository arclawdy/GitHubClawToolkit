name: Ensure runner tools
description: >
  確認 runner 具備執行 workflow 所需的工具；若尚未安裝 copilot CLI 則透過官方腳本補上。
  同時將 $HOME/.local/bin 附加到 GITHUB_PATH，讓後續 steps 繼承 PATH 修改。

inputs:
  copilot_version:
    description: 'copilot CLI 版本（例如 v1.0.9）'
    required: false
    default: 'v1.0.9'

runs:
  using: composite
  steps:
    - name: Install and verify tools
      shell: bash
      run: |
        set -euo pipefail

        # 讓以 pip --user 安裝的 CLI 在本 step 與後續 steps 都能被找到。
        printf '%s\n' "$HOME/.local/bin" >> "$GITHUB_PATH"
        export PATH="$HOME/.local/bin:$PATH"

        # 先確認基礎 CLI 都存在，並印出版本方便除錯。
        gh --version
        git --version
        node --version
        npm --version
        python3 --version
        jq --version

        # 若 runner 尚未安裝 copilot CLI，就透過官方安裝腳本補上。
        if ! command -v copilot >/dev/null 2>&1; then
          curl -fsSL https://gh.io/copilot-install | VERSION=${{ inputs.copilot_version }} bash
        fi

        copilot --version
