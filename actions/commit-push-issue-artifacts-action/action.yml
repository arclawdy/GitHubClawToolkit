name: Commit and push artifacts
description: >
  把 issue workspace 內產生的 artifacts 提交並推到 issue branch。
  以 git checkout <commit> -- <dir> 取代 cherry-pick，避免遠端刪除 workspace 檔案後
  出現 CONFLICT (modify/delete) 的問題。

inputs:
  issue_number:
    description: Issue 編號，用於 commit message
    required: true
  issue_dir:
    description: Issue 工作目錄（例如 workspaces/issue-123）
    required: true
  branch_name:
    description: 要推送的 branch 名稱
    required: true
  push_token:
    description: 用來 git push 的 GitHub token
    required: true
  git_user_name:
    description: git commit 的 user.name
    required: true
  git_user_email:
    description: git commit 的 user.email
    required: true
  github_repository:
    description: owner/repo
    required: true

runs:
  using: composite
  steps:
    - name: Commit and push artifacts
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.push_token }}
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        ISSUE_DIR: ${{ inputs.issue_dir }}
        BRANCH_NAME: ${{ inputs.branch_name }}
        PUSH_TOKEN: ${{ inputs.push_token }}
        AUTOMATION_GIT_USER_NAME: ${{ inputs.git_user_name }}
        AUTOMATION_GIT_USER_EMAIL: ${{ inputs.git_user_email }}
        GITHUB_REPOSITORY: ${{ inputs.github_repository }}
      run: |
        set -euo pipefail

        # 若關鍵路徑沒準備好，就直接跳過，避免推送錯誤內容。
        if [[ -z "${ISSUE_DIR}" || -z "${BRANCH_NAME}" ]]; then
          echo "No workspace dir set; skipping artifact commit."
          exit 0
        fi

        # 確保 git 身分與遠端 URL 正確，composite action 不繼承前一 step 的設定。
        git config user.name "${AUTOMATION_GIT_USER_NAME}"
        git config user.email "${AUTOMATION_GIT_USER_EMAIL}"
        git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

        # 只暫存這次 issue 工作目錄下的產物。
        git add "${ISSUE_DIR}"

        # 若沒有任何新變更，就不做空 commit。
        if git diff --cached --quiet -- "${ISSUE_DIR}"; then
          echo "No artifact changes to commit."
          exit 0
        fi

        # 先在本地建立 artifact commit，後續再把它重演到遠端 issue branch 的最新頂端。
        git commit -m "chore: record coding agent output for issue #${ISSUE_NUMBER}"

        # 記下剛才提交的 agent output commit hash 與訊息。
        AGENT_COMMIT=$(git rev-parse HEAD)
        AGENT_COMMIT_MESSAGE=$(git log -1 --format=%s "${AGENT_COMMIT}")

        push_succeeded=false
        for attempt in 1 2 3; do
          git fetch origin "${BRANCH_NAME}" || true

          if git show-ref --verify --quiet "refs/remotes/origin/${BRANCH_NAME}"; then
            # 重設到遠端分支頂端，再直接把 agent commit 的 issue 目錄內容 checkout 上去。
            # 使用 git checkout <commit> -- <dir> 而非 cherry-pick，可避免遠端分支若曾刪除
            # workspace 檔案時產生的 CONFLICT (modify/delete) 問題，邏輯更簡單且穩健。
            git reset --hard "origin/${BRANCH_NAME}"
            git checkout "${AGENT_COMMIT}" -- "${ISSUE_DIR}"

            # 若 staging area 沒有變更，代表遠端已包含等效內容，視為 no-op。
            if git diff --cached --quiet; then
              echo "No changes to push: remote branch already contains equivalent artifact content."
              push_succeeded=true
              break
            fi

            git commit -m "${AGENT_COMMIT_MESSAGE}"
            if git push origin "HEAD:${BRANCH_NAME}"; then
              push_succeeded=true
              break
            fi
          else
            if git push --set-upstream origin "HEAD:${BRANCH_NAME}"; then
              push_succeeded=true
              break
            fi
          fi
          echo "::warning::Push attempt ${attempt}/3 failed; retrying in $((attempt * 3))s..."
          sleep $((attempt * 3))
        done

        if [ "$push_succeeded" != "true" ]; then
          echo "::error::Failed to push after 3 attempts."
          exit 1
        fi
